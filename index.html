<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindControl SaaS</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

.hidden{display:none;}

h1{font-size:28px;}

button{
  background:#00ffcc;
  border:none;
  padding:12px;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:#1a1a1a;
  padding:15px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

.card:hover{background:#222;}

.lock{
  border:1px solid red;
  padding:15px;
  margin-top:15px;
}

.progress{
  margin:10px;
}
</style>

</head>
<body>

<!-- LANDING -->
<section id="landing">
<h1>You’re not lazy… you’re just mentally overloaded.</h1>
<p>No motivation. Just real systems.</p>
<button onclick="showSystems()">Choose Your System</button>
</section>

<!-- SYSTEM LIST -->
<section id="systems" class="hidden">
<h2>Select System</h2>
<div id="systemsContainer"></div>
</section>

<!-- SYSTEM PAGE -->
<section id="systemPage" class="hidden">
<h2 id="title"></h2>

<div class="progress" id="progress"></div>

<div id="days"></div>

<div class="lock hidden" id="lockBox">
<p>Your system is ready. Unlock to continue.</p>
<button onclick="payNow(700)">Unlock ($7)</button>
<button onclick="payNow(1500)">All Systems ($15)</button>
</div>

<button onclick="goBack()">Back</button>
</section>

<!-- CHAT -->
<section id="chat" class="hidden">
<div id="chatBox"></div>
<input id="input" placeholder="Ask...">
<button onclick="sendMsg()">Send</button>
</section>

<script>

/* ============================
   🧠 DYNAMIC SYSTEM DATA
============================ */

const systemsData = {
focus:{
title:"Fix Focus in 7 Days",
description:"Deep focus system",
days:[
"Day 1: Remove distractions",
"Day 2: 25 min focus",
"Day 3: Deep work [LOCKED]",
"Day 4: Energy control [LOCKED]",
"Day 5: Goal clarity [LOCKED]",
"Day 6: Consistency [LOCKED]",
"Day 7: Mastery [LOCKED]"
]
},

overthinking:{
title:"Stop Overthinking",
description:"Control your thoughts",
days:[
"Day 1: Identify triggers",
"Day 2: Thought control",
"Day 3: Action system [LOCKED]",
"Day 4: Reduce noise [LOCKED]",
"Day 5: Decision power [LOCKED]",
"Day 6: Confidence [LOCKED]",
"Day 7: Control mind [LOCKED]"
]
}
};

/* ============================
   🔥 LOAD SYSTEM CARDS
============================ */

function showSystems(){
document.getElementById("landing").classList.add("hidden");
document.getElementById("systems").classList.remove("hidden");

let container=document.getElementById("systemsContainer");
container.innerHTML="";

for(let key in systemsData){
let sys=systemsData[key];

let div=document.createElement("div");
div.className="card";
div.innerHTML=`<h3>${sys.title}</h3><p>${sys.description}</p>`;
div.onclick=()=>openSystem(key);

container.appendChild(div);
}
}

/* ============================
   📅 OPEN SYSTEM
============================ */

let currentSystem="";

function openSystem(key){
currentSystem=key;

document.getElementById("systems").classList.add("hidden");
document.getElementById("systemPage").classList.remove("hidden");

let sys=systemsData[key];
document.getElementById("title").innerText=sys.title;

renderDays(sys);
}

/* ============================
   🧠 RENDER DAYS
============================ */

function renderDays(sys){
let container=document.getElementById("days");
container.innerHTML="";

let progress=0;

sys.days.forEach((d,i)=>{
let div=document.createElement("div");
div.className="card";

if(d.includes("[LOCKED]")){
div.style.opacity="0.5";
document.getElementById("lockBox").classList.remove("hidden");
}else{
progress++;
}

div.innerText=d;
container.appendChild(div);
});

document.getElementById("progress").innerText=`Progress: ${progress}/7`;
}

/* ============================
   💳 PAYMENT
============================ */

function payNow(amount){

var options={
"key":"YOUR_KEY_ID",
"amount":amount*100,
"currency":"INR",
"name":"MindControl",
"description":"Unlock System",

"handler":function(){
unlockSystem();
alert("Unlocked 🔓");
},

"theme":{"color":"#00ffcc"}
};

var rzp=new Razorpay(options);
rzp.open();
}

/* ============================
   🔓 UNLOCK
============================ */

function unlockSystem(){

let sys=systemsData[currentSystem];

sys.days=sys.days.map(d=>d.replace("[LOCKED]",""));

localStorage.setItem(currentSystem,"paid");

renderDays(sys);
document.getElementById("lockBox").classList.add("hidden");
}

/* ============================
   🤖 CHAT
============================ */

function sendMsg(){
let input=document.getElementById("input").value;
let box=document.getElementById("chatBox");

box.innerHTML+=`<div>You: ${input}</div>`;
box.innerHTML+=`<div>AI: Follow Day 1 properly.</div>`;
}

/* ============================
   🔙 BACK
============================ */

function goBack(){
document.getElementById("systemPage").classList.add("hidden");
document.getElementById("systems").classList.remove("hidden");
}

</script>

</body>
</html>
